# ╭──────────────────────────────────────────────────────────────────────╮
# │  Aidevix CLI — dunyodagi top AI CLI agentlari ro'yxati                │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Format (6 majburiy + 2 ixtiyoriy maydon, "|" bilan ajratiladi):      │
# │                                                                        │
# │   NAME|BINARY|COMMAND|INSTALL|DESCRIPTION|CATEGORY|AUTH|URL             │
# │                                                                        │
# │   • NAME        – menyuda ko'rinadigan nom                             │
# │   • BINARY      – PATH'da tekshiriladigan bajariluvchi fayl nomi       │
# │   • COMMAND     – ishga tushiriladigan buyruq (argumentlar bilan)      │
# │   • INSTALL     – CLI o'rnatilmagan bo'lsa ishlatiladigan o'rnatish    │
# │                   buyrug'i (pipe "|" ishlatmang — uning o'rniga        │
# │                   bash -c "$(curl ...)" shaklidan foydalaning)         │
# │   • DESCRIPTION – qisqacha izoh                                        │
# │   • CATEGORY    – guruh nomi: Coding, Pair, Agent, Local, Chat         │
# │   • AUTH        – (ixtiyoriy) login/kalit talabi. Belgilar:            │
# │                     🆓 bepul · 🔑 API kalit · 🌐 brauzer login · 💳 obuna │
# │   • URL         – (ixtiyoriy) login/kalit olish yoki hujjat sahifasi.  │
# │                   Birinchi ishga tushishda shu link brauzerda ochiladi.│
# │                                                                        │
# │  '#' bilan boshlangan va bo'sh qatorlar e'tiborga olinmaydi.          │
# │  AUTH'da "🆓" yoki "bepul" bo'lsa, agent "aidevix --free"da chiqadi.   │
# │  O'z agentingizni qo'shish — "aidevix --add" yoki shu faylga qator.    │
# ╰──────────────────────────────────────────────────────────────────────╯

