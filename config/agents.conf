# ╭──────────────────────────────────────────────────────────────────────╮
# │  AI Terminal Pult — Agentlar ro'yxati / Agents registry               │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Format (4 ta maydon, "|" bilan ajratiladi):                          │
# │                                                                        │
# │     NAME | BINARY | COMMAND | DESCRIPTION                              │
# │                                                                        │
# │   • NAME        – menyuda ko'rinadigan nom                             │
# │   • BINARY      – PATH'da tekshiriladigan bajariluvchi fayl nomi       │
# │                   (mavjudligi `command -v` orqali aniqlanadi)          │
# │   • COMMAND     – haqiqatda ishga tushiriladigan buyruq (argumentlar   │
# │                   bilan bo'lishi mumkin)                               │
# │   • DESCRIPTION – qisqacha izoh                                        │
# │                                                                        │
# │  '#' bilan boshlangan qatorlar va bo'sh qatorlar e'tiborga olinmaydi.  │
# │                                                                        │
# │  O'z agentingizni qo'shish uchun shu fayl oxiriga yangi qator yozing.  │
# ╰──────────────────────────────────────────────────────────────────────╯

