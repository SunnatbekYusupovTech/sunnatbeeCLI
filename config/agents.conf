# ╭──────────────────────────────────────────────────────────────────────╮
# │  Aidevix CLI — dunyodagi top AI CLI agentlari ro'yxati                │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Format (6 majburiy + 1 ixtiyoriy maydon, "|" bilan ajratiladi):      │
# │                                                                        │
# │     NAME | BINARY | COMMAND | INSTALL | DESCRIPTION | CATEGORY | AUTH   │
# │                                                                        │
# │   • NAME        – menyuda ko'rinadigan nom                             │
# │   • BINARY      – PATH'da tekshiriladigan bajariluvchi fayl nomi       │
# │   • COMMAND     – ishga tushiriladigan buyruq (argumentlar bilan)      │
# │   • INSTALL     – CLI o'rnatilmagan bo'lsa ishlatiladigan o'rnatish    │
# │                   buyrug'i (pipe "|" ishlatmang — uning o'rniga        │
# │                   bash -c "$(curl ...)" shaklidan foydalaning)         │
# │   • DESCRIPTION – qisqacha izoh                                        │
# │   • CATEGORY    – guruh nomi: Coding, Pair, Agent, Local, Chat         │
# │   • AUTH        – (ixtiyoriy) login/kalit talabi. Belgilar:            │
# │                     🔑 API kalit · 🌐 brauzer login · 💳 obuna · 🆓 bepul │
# │                                                                        │
# │  '#' bilan boshlangan va bo'sh qatorlar e'tiborga olinmaydi.          │
# │  O'z agentingizni qo'shish — shu fayl oxiriga bitta qator yozing       │
# │  (yoki "aidevix --add" buyrug'idan foydalaning).                       │
# ╰──────────────────────────────────────────────────────────────────────╯

# ── Coding agentlari (terminalda kod yozadigan AI'lar) ───────────────────
Claude Code|claude|claude|npm install -g @anthropic-ai/claude-code@latest|🧠 Anthropic'ning rasmiy Claude kod agenti|Coding|🔑 ANTHROPIC_API_KEY yoki 💳 Claude Pro/Max obunasi
OpenAI Codex|codex|codex|npm install -g @openai/codex@latest|⚡ OpenAI Codex terminal agenti|Coding|🌐 ChatGPT login yoki 🔑 OPENAI_API_KEY
Gemini CLI|gemini|gemini|npm install -g @google/gemini-cli@latest|✨ Google Gemini terminal agenti|Coding|🌐 Google login (bepul) yoki 🔑 GEMINI_API_KEY
GitHub Copilot|copilot|copilot|npm install -g @github/copilot@latest|🐙 GitHub Copilot CLI agenti|Coding|💳 GitHub + Copilot obunasi
OpenCode|opencode|opencode|npm install -g opencode-ai@latest|🟢 Ochiq manbali terminal coding agenti|Coding|🔑 provayder API kaliti
Crush|crush|crush|npm install -g @charmland/crush@latest|💅 Charm'ning chiroyli AI coding agenti|Coding|🔑 provayder API kaliti
Qwen Code|qwen|qwen|npm install -g @qwen-code/qwen-code@latest|🐉 Alibaba Qwen Code CLI agenti|Coding|🌐 Qwen login yoki 🔑 API kalit
Continue|cn|cn|npm install -g @continuedev/cli@latest|🔁 Continue.dev terminal agenti|Coding|🌐 Continue login yoki 🔑 API kalit
Cursor Agent|cursor-agent|cursor-agent|bash -c "$(curl -fsS https://cursor.com/install)"|🎯 Cursor'ning terminal agenti (Windows'da emas)|Coding|🌐 Cursor hisobiga login
Plandex|plandex|plandex|bash -c "$(curl -sL https://plandex.ai/install.sh)"|🗺️ Katta vazifalarni rejalashtiruvchi agent|Coding|🌐 Plandex login yoki 🔑 API kalit

# ── Pair programming (juftlik dasturlash) ────────────────────────────────
Aider|aider|aider|python3 -m pip install --user --upgrade aider-chat|🤝 AI juftlik dasturlash (pair programming)|Pair|🔑 provayder API kaliti (OpenAI/Anthropic/OpenRouter)

# ── Avtonom agentlar ─────────────────────────────────────────────────────
Goose|goose|goose session|bash -c "$(curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh)"|🦢 Block'ning avtonom AI agenti|Agent|🔑 provayder API kaliti

# ── Lokal modellar (internetsiz, mahfiy) ─────────────────────────────────
Ollama|ollama|ollama run llama3.2|bash -c "$(curl -fsSL https://ollama.com/install.sh)"|🦙 Lokal LLM'larni ishga tushiruvchi (offline)|Local|🆓 bepul — lokal, login shart emas

# ── Chat / yordamchi CLI'lar ─────────────────────────────────────────────
llm|llm|llm|python3 -m pip install --user --upgrade llm|💬 Simon Willison'ning ko'p-provayderli LLM CLI'i|Chat|🔑 provayder API kaliti
AIChat|aichat|aichat|cargo install aichat|🗨️ Hammasi-birda LLM CLI (chat + REPL + agent)|Chat|🔑 provayder API kaliti
