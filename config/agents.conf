# ╭──────────────────────────────────────────────────────────────────────╮
# │  AI CLI Pult — Professional AI CLI agentlari ro'yxati                 │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Format (5 majburiy + 1 ixtiyoriy maydon, "|" bilan ajratiladi):      │
# │                                                                        │
# │     NAME | BINARY | COMMAND | INSTALL | DESCRIPTION | CATEGORY         │
# │                                                                        │
# │   • NAME        – menyuda ko'rinadigan nom                             │
# │   • BINARY      – PATH'da tekshiriladigan bajariluvchi fayl nomi       │
# │   • COMMAND     – ishga tushiriladigan buyruq (argumentlar bilan)      │
# │   • INSTALL     – CLI o'rnatilmagan bo'lsa ishlatiladigan o'rnatish    │
# │                   buyrug'i (pipe "|" ishlatmang — uning o'rniga        │
# │                   bash -c "$(curl ...)" shaklidan foydalaning)         │
# │   • DESCRIPTION – qisqacha izoh                                        │
# │   • CATEGORY    – (ixtiyoriy) guruh nomi, masalan: Coding, Chat, Local │
# │                                                                        │
# │  '#' bilan boshlangan va bo'sh qatorlar e'tiborga olinmaydi.          │
# │  O'z agentingizni qo'shish — shu fayl oxiriga bitta qator yozing.     │
# ╰──────────────────────────────────────────────────────────────────────╯

Claude Code|claude|claude|npm install -g @anthropic-ai/claude-code@latest|🧠 Anthropic'ning rasmiy Claude CLI agenti|Coding
Aider|aider|aider|python3 -m pip install --user --upgrade aider-chat|🤝 AI juftlik dasturlash (pair programming)|Pair
OpenAI Codex|codex|codex|npm install -g @openai/codex@latest|⚡ OpenAI Codex terminal agenti|Coding
Gemini CLI|gemini|gemini|npm install -g @google/gemini-cli@latest|✨ Google Gemini terminal agenti|Chat
GitHub Copilot|copilot|copilot|npm install -g @github/copilot@latest|🐙 GitHub Copilot CLI agenti|Coding
Goose|goose|goose session|bash -c "$(curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh)"|🦢 Block'ning lokal AI agenti|Local
OpenCode|opencode|opencode|npm install -g opencode-ai@latest|🟢 Ochiq manbali terminal coding agenti|Coding
Crush|crush|crush|npm install -g @charmland/crush@latest|💅 Charm'ning AI coding agenti|Coding
Qwen Code|qwen|qwen|npm install -g @qwen-code/qwen-code@latest|🐉 Alibaba Qwen Code CLI agenti|Coding
Cursor Agent|cursor-agent|cursor-agent|bash -c "$(curl -fsS https://cursor.com/install)"|🎯 Cursor'ning terminal agenti|Coding
