# ╭──────────────────────────────────────────────────────────────────────╮
# │  AI CLI Pult — Professional AI CLI agentlari ro'yxati                 │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Format (5 ta maydon, "|" bilan ajratiladi):                          │
# │                                                                        │
# │     NAME | BINARY | COMMAND | INSTALL | DESCRIPTION                    │
# │                                                                        │
# │   • NAME        – menyuda ko'rinadigan nom                             │
# │   • BINARY      – PATH'da tekshiriladigan bajariluvchi fayl nomi       │
# │   • COMMAND     – ishga tushiriladigan buyruq (argumentlar bilan)      │
# │   • INSTALL     – CLI o'rnatilmagan bo'lsa ishlatiladigan o'rnatish    │
# │                   buyrug'i (pipe "|" ishlatmang — uning o'rniga        │
# │                   bash -c "$(curl ...)" shaklidan foydalaning)         │
# │   • DESCRIPTION – qisqacha izoh                                        │
# │                                                                        │
# │  '#' bilan boshlangan va bo'sh qatorlar e'tiborga olinmaydi.          │
# │  O'z agentingizni qo'shish — shu fayl oxiriga bitta qator yozing.     │
# ╰──────────────────────────────────────────────────────────────────────╯

Claude Code|claude|claude|npm install -g @anthropic-ai/claude-code|🧠 Anthropic'ning rasmiy Claude CLI agenti
Aider|aider|aider|python3 -m pip install --user -U aider-chat|🤝 AI juftlik dasturlash (pair programming)
OpenAI Codex|codex|codex|npm install -g @openai/codex|⚡ OpenAI Codex terminal agenti
Gemini CLI|gemini|gemini|npm install -g @google/gemini-cli|✨ Google Gemini terminal agenti
GitHub Copilot|copilot|copilot|npm install -g @github/copilot|🐙 GitHub Copilot CLI agenti
Goose|goose|goose session|bash -c "$(curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh)"|🦢 Block'ning lokal AI agenti
OpenCode|opencode|opencode|npm install -g opencode-ai|🟢 Ochiq manbali terminal coding agenti
Crush|crush|crush|npm install -g @charmland/crush|💅 Charm'ning AI coding agenti
Qwen Code|qwen|qwen|npm install -g @qwen-code/qwen-code|🐉 Alibaba Qwen Code CLI agenti
Cursor Agent|cursor-agent|cursor-agent|bash -c "$(curl -fsS https://cursor.com/install)"|🎯 Cursor'ning terminal agenti
