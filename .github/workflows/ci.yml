name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          # SC1091 — `source` qilingan faylni CI'da kuzatib bo'lmaydi (runtime'da yuklanadi).
          SHELLCHECK_OPTS: -e SC1091
        with:
          severity: error
          additional_files: completions/aidevix.bash

  syntax:
    name: Bash sintaksis tekshiruvi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: bash -n (barcha skriptlar)
        run: |
          set -e
          for f in bootstrap.sh install.sh uninstall.sh bin/ai-selector.sh lib/common.sh completions/aidevix.bash; do
            echo "→ $f"
            bash -n "$f"
          done
          echo "✓ Barcha skriptlar sintaktik to'g'ri."

  config:
    name: agents.conf validatsiyasi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Har bir agent qatorida 5-7 ta "|" borligini tekshirish
        run: |
          set -e
          fail=0
          # 6 majburiy (5 "|") + AUTH + URL (ixtiyoriy) => 5..7 "|" ruxsat etiladi.
          while IFS= read -r line; do
            case "$line" in ''|\#*) continue ;; esac
            n=$(printf '%s' "$line" | tr -cd '|' | wc -c)
            name=$(printf '%s' "$line" | cut -d'|' -f1)
            if [ "$n" -lt 5 ] || [ "$n" -gt 7 ]; then
              echo "::error::Noto'g'ri maydon soni ($n ta '|', 5-7 kerak): $name"
              fail=1
            fi
          done < config/agents.conf
          [ "$fail" -eq 0 ] && echo "✓ agents.conf formati to'g'ri."

  bats:
    name: Bats testlari
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Bats'ni o'rnatish
        uses: bats-core/bats-action@3.0.0
        with:
          # Bizga faqat bats-core kerak — qo'shimcha kutubxonalarsiz.
          support-install: false
          assert-install: false
          detik-install: false
          file-install: false

      - name: Testlarni ishga tushirish
        run: bats --print-output-on-failure --timing tests/

  packaging:
    name: Paketlash tekshiruvi (npm/JSON)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: cli.js sintaksisi
        run: node --check bin/cli.js

      - name: JSON fayllar to'g'riligi
        run: |
          set -e
          for f in package.json packaging/scoop/aidevix.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "✓ $f"
          done

      - name: package.json va VERSION mosligi
        run: |
          set -e
          pv="$(node -p "require('./package.json').version")"
          fv="$(tr -d '[:space:]' < VERSION)"
          echo "package.json: $pv · VERSION: $fv"
          [ "$pv" = "$fv" ] || { echo "::error::package.json versiyasi VERSION'ga mos emas"; exit 1; }

      - name: npm paketini sinov tarzda yig'ish (pack)
        run: npm pack --dry-run
