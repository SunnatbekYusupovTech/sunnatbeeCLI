<svg xmlns="http://www.w3.org/2000/svg" width="760" height="466" viewBox="0 0 760 466" font-family="'SFMono-Regular','Consolas','Liberation Mono','Menlo',monospace" font-size="15">
  <defs>
    <linearGradient id="ad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#33ccff"/>
      <stop offset="0.5" stop-color="#3399ff"/>
      <stop offset="1" stop-color="#ff5fd2"/>
    </linearGradient>
  </defs>

  <!-- Terminal oynasi -->
  <rect x="0.5" y="0.5" width="759" height="465" rx="12" fill="#0d1117" stroke="#30363d"/>
  <!-- Sarlavha paneli -->
  <rect x="0.5" y="0.5" width="759" height="40" rx="12" fill="#161b22"/>
  <rect x="0.5" y="28" width="759" height="13" fill="#161b22"/>
  <circle cx="22" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="20" r="6" fill="#27c93f"/>
  <text x="380" y="25" text-anchor="middle" fill="#8b949e" font-size="13">✦ Aidevix CLI</text>

  <!-- Tana -->
  <g>
    <!-- version -->
    <text x="24" y="78"><tspan fill="#ff5fd2">❯ </tspan><tspan fill="#58e6ff">aidevix --version</tspan></text>
    <text x="24" y="102" fill="#c9d1d9">Aidevix CLI 1.1.0</text>

    <!-- list -->
    <text x="24" y="134"><tspan fill="#ff5fd2">❯ </tspan><tspan fill="#58e6ff">aidevix --list</tspan></text>
    <text x="24" y="160" fill="#6e7681" font-size="13">AGENT            HOLAT          GURUH    LOGIN</text>
    <text x="24" y="184"><tspan fill="#3fb950">✓</tspan><tspan fill="#c9d1d9">  Claude Code     o'rnatilgan    Coding   🔑 / 💳</tspan></text>
    <text x="24" y="206"><tspan fill="#3fb950">✓</tspan><tspan fill="#c9d1d9">  Gemini CLI      o'rnatilgan    Coding   🆓 / 🔑</tspan></text>
    <text x="24" y="228"><tspan fill="#f85149">✗</tspan><tspan fill="#c9d1d9">  Aider           yo'q           Pair     🔑</tspan></text>
    <text x="24" y="250"><tspan fill="#3fb950">✓</tspan><tspan fill="#c9d1d9">  Ollama          o'rnatilgan    Local    🆓 bepul</tspan></text>

    <!-- menu -->
    <text x="24" y="288"><tspan fill="#ff5fd2">❯ </tspan><tspan fill="#58e6ff">aidevix</tspan><tspan fill="#6e7681">            # interaktiv menyu (fzf + preview)</tspan></text>
    <text x="24" y="312"><tspan fill="url(#ad)" font-weight="bold">▶ Claude Code</tspan><tspan fill="#6e7681">   ↑/↓ tanlang · qidiring · ENTER</tspan></text>

    <!-- launch -->
    <text x="24" y="350"><tspan fill="#ff5fd2">❯ </tspan><tspan fill="#58e6ff">aidevix claude</tspan></text>
    <text x="24" y="374"><tspan fill="#58e6ff" font-weight="bold">🚀 Ishga tushirilmoqda</tspan><tspan fill="#c9d1d9">  Claude Code</tspan></text>
  </g>

  <!-- Pastki izoh -->
  <text x="24" y="430" fill="#6e7681" font-size="13">barcha AI agentlar — bitta pultda</text>
  <text x="736" y="430" text-anchor="end" fill="url(#ad)" font-size="13" font-weight="bold">aidevix</text>
</svg>
